<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symmetry Splash Lab</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        :root {
            --primary: #4facfe;
            --secondary: #00f2fe;
            --accent: #ff0844;
            --accent2: #ffb199;
            --success: #38ef7d;
            --success-dark: #11998e;
            --bg-color: #f0f7fb;
            --text-dark: #2d3436;
            --panel-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(#d1e5f0 2px, transparent 2px);
            background-size: 30px 30px;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        header {
            text-align: center;
            margin-top: 20px;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            justify-content: center;
        }

        .difficulty-btn {
            background: var(--panel-bg);
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 20px;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .difficulty-btn.active {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }

        #game-container {
            position: relative;
            width: 90vw;
            max-width: 800px;
            height: 60vh;
            min-height: 400px;
            background: var(--panel-bg);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-top: 20px;
            overflow: hidden;
            border: 4px solid white;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .ui-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            pointer-events: none; /* Let clicks pass through unless on buttons */
        }

        .action-btn {
            pointer-events: auto;
            font-family: 'Nunito', sans-serif;
            font-size: 1.2rem;
            font-weight: 900;
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.15);
            transition: transform 0.1s, box-shadow 0.1s;
            display: none; /* Hidden by default */
        }

        .action-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 rgba(0,0,0,0.15);
        }

        #btn-cut {
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            color: white;
            font-size: 1.5rem;
        }

        #btn-sym {
            background: linear-gradient(135deg, var(--success), var(--success-dark));
            color: white;
        }

        #btn-asym {
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            color: #d63031;
        }

        #feedback-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            max-width: 80%;
        }

        #feedback-panel.show {
            transform: translate(-50%, -50%) scale(1);
        }

        #feedback-title {
            font-size: 2rem;
            font-weight: 900;
            margin: 0;
        }

        #feedback-text {
            font-size: 1.2rem;
            color: #636e72;
            margin: 0;
        }

        #btn-next {
            background: var(--primary);
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #0984e3;
        }

        #btn-next:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #0984e3;
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }

        .instructions {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary);
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

    <header>
        <h1>Symmetry Splash Lab</h1>
        <div class="controls">
            <button class="difficulty-btn active" data-level="easy">Easy</button>
            <button class="difficulty-btn" data-level="medium">Medium</button>
            <button class="difficulty-btn" data-level="hard">Hard</button>
        </div>
    </header>

    <div id="game-container">
        <div class="instructions" id="instructions">Draw a line where you think the shape is symmetrical!</div>
        <canvas id="gameCanvas"></canvas>
        
        <div class="ui-overlay">
            <button id="btn-cut" class="action-btn">✂️ Cut!</button>
            <button id="btn-sym" class="action-btn">✅ Symmetrical</button>
            <button id="btn-asym" class="action-btn">❌ Not Symmetrical</button>
        </div>

        <div id="feedback-panel">
            <h2 id="feedback-title">Correct!</h2>
            <p id="feedback-text">Both sides are mirror images.</p>
            <button id="btn-next">Next Shape</button>
        </div>
    </div>

    <script>
        // --- GAME STATE & CONSTANTS ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');
        const instructions = document.getElementById('instructions');
        
        let width, height;
        let difficulty = 'easy'; // easy, medium, hard
        let state = 'DRAWING'; // DRAWING, CUT_READY, CUTTING, ANSWERING, FEEDBACK
        
        // Input tracking
        let isDragging = false;
        let lineStart = null;
        let lineEnd = null;

        // Current Shape Data
        let currentShape = null;
        
        // Cutting Animation Data
        let splitOffset = 0;
        let cutLine = null; // The finalized line (possibly snapped)

        // Particles
        let confetti = [];

        // UI Elements
        const btnCut = document.getElementById('btn-cut');
        const btnSym = document.getElementById('btn-sym');
        const btnAsym = document.getElementById('btn-asym');
        const feedbackPanel = document.getElementById('feedback-panel');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackText = document.getElementById('feedback-text');
        const btnNext = document.getElementById('btn-next');
        const diffBtns = document.querySelectorAll('.difficulty-btn');

        // --- SHAPE DEFINITIONS ---
        // Shapes are defined centered at (0,0). Size roughly fits in a 100px radius.
        const shapeDefinitions = [
            {
                name: 'Heart',
                sym: true,
                baseAngle: Math.PI / 2, // Vertical symmetry axis
                color: '#ff7675',
                draw: (c) => {
                    c.beginPath();
                    c.moveTo(0, 30);
                    c.bezierCurveTo(-50, -20, -100, -80, -30, -100);
                    c.bezierCurveTo(0, -110, 0, -40, 0, -40);
                    c.bezierCurveTo(0, -40, 0, -110, 30, -100);
                    c.bezierCurveTo(100, -80, 50, -20, 0, 30);
                    c.fill();
                    c.stroke();
                }
            },
            {
                name: 'Star',
                sym: true,
                baseAngle: Math.PI / 2,
                color: '#f9ca24',
                draw: (c) => {
                    c.beginPath();
                    for (let i = 0; i < 10; i++) {
                        let r = i % 2 === 0 ? 100 : 40;
                        let a = (i * Math.PI) / 5 - Math.PI / 2;
                        if (i === 0) c.moveTo(Math.cos(a) * r, Math.sin(a) * r);
                        else c.lineTo(Math.cos(a) * r, Math.sin(a) * r);
                    }
                    c.closePath();
                    c.fill();
                    c.stroke();
                }
            },
            {
                name: 'Butterfly',
                sym: true,
                baseAngle: Math.PI / 2,
                color: '#a29bfe',
                draw: (c) => {
                    c.beginPath();
                    // Left Wing
                    c.moveTo(0, 0);
                    c.bezierCurveTo(-80, -100, -120, -40, -40, 10);
                    c.bezierCurveTo(-100, 60, -60, 120, 0, 40);
                    // Right Wing
                    c.bezierCurveTo(60, 120, 100, 60, 40, 10);
                    c.bezierCurveTo(120, -40, 80, -100, 0, 0);
                    c.fill();
                    c.stroke();
                    // Body
                    c.fillStyle = '#636e72';
                    c.beginPath();
                    c.ellipse(0, 0, 10, 40, 0, 0, Math.PI * 2);
                    c.fill();
                }
            },
            {
                name: 'Shield',
                sym: true,
                baseAngle: Math.PI / 2,
                color: '#0984e3',
                draw: (c) => {
                    c.beginPath();
                    c.moveTo(0, -90);
                    c.lineTo(80, -90);
                    c.lineTo(80, 0);
                    c.bezierCurveTo(80, 60, 40, 100, 0, 110);
                    c.bezierCurveTo(-40, 100, -80, 60, -80, 0);
                    c.lineTo(-80, -90);
                    c.closePath();
                    c.fill();
                    c.stroke();
                }
            },
            {
                name: 'Irregular Blob',
                sym: false,
                baseAngle: null,
                color: '#55efc4',
                draw: (c) => {
                    c.beginPath();
                    c.moveTo(0, -100);
                    c.bezierCurveTo(100, -80, 120, 40, 50, 90);
                    c.bezierCurveTo(-10, 110, -100, 60, -70, 0);
                    c.bezierCurveTo(-40, -60, -50, -110, 0, -100);
                    c.fill();
                    c.stroke();
                }
            },
            {
                name: 'Letter L',
                sym: false,
                baseAngle: null,
                color: '#fdcb6e',
                draw: (c) => {
                    c.beginPath();
                    c.moveTo(-40, -100);
                    c.lineTo(10, -100);
                    c.lineTo(10, 50);
                    c.lineTo(80, 50);
                    c.lineTo(80, 100);
                    c.lineTo(-40, 100);
                    c.closePath();
                    c.fill();
                    c.stroke();
                }
            }
        ];

        // --- SETUP & RESIZING ---
        function resize() {
            // Handle high DPI displays
            const rect = container.getBoundingClientRect();
            width = rect.width;
            height = rect.height;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', () => { resize(); drawFrame(); });
        
        // --- GAME LOGIC ---
        function startNewRound() {
            state = 'DRAWING';
            lineStart = null;
            lineEnd = null;
            splitOffset = 0;
            cutLine = null;
            confetti = [];
            
            btnCut.style.display = 'none';
            btnSym.style.display = 'none';
            btnAsym.style.display = 'none';
            feedbackPanel.classList.remove('show');
            instructions.style.opacity = '1';

            // Select shape based on difficulty weighting
            // Ensure a good mix of sym and asym
            let isSymTarget = Math.random() > 0.4; // 60% chance for a symmetrical shape
            let availableShapes = shapeDefinitions.filter(s => s.sym === isSymTarget);
            if (availableShapes.length === 0) availableShapes = shapeDefinitions;
            
            let def = availableShapes[Math.floor(Math.random() * availableShapes.length)];
            
            let rot = 0;
            if (difficulty === 'easy') {
                rot = 0; // Always upright (vertical symmetry if applicable)
            } else if (difficulty === 'medium') {
                // 0, 90, 180, 270 degrees
                rot = (Math.floor(Math.random() * 4) * Math.PI) / 2;
            } else {
                // Any rotation
                rot = Math.random() * Math.PI * 2;
            }

            currentShape = {
                def: def,
                x: width / 2,
                y: height / 2,
                rot: rot,
                scale: 1.5 + Math.random() * 0.5, // Random slight scale variation
                actualSymAngle: def.sym ? (def.baseAngle + rot) : null
            };

            drawFrame();
        }

        // --- INPUT HANDLING ---
        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function handlePointerDown(e) {
            if (state !== 'DRAWING' && state !== 'CUT_READY') return;
            e.preventDefault();
            isDragging = true;
            lineStart = getPointerPos(e);
            lineEnd = lineStart;
            state = 'DRAWING';
            btnCut.style.display = 'none';
            instructions.style.opacity = '0';
        }

        function handlePointerMove(e) {
            if (!isDragging) return;
            e.preventDefault();
            lineEnd = getPointerPos(e);
            drawFrame();
        }

        function handlePointerUp(e) {
            if (!isDragging) return;
            isDragging = false;
            
            // If the line is too short, cancel it
            let dist = Math.hypot(lineEnd.x - lineStart.x, lineEnd.y - lineStart.y);
            if (dist < 50) {
                lineStart = null;
                lineEnd = null;
                instructions.style.opacity = '1';
                drawFrame();
                return;
            }

            state = 'CUT_READY';
            btnCut.style.display = 'block';
            drawFrame();
        }

        canvas.addEventListener('mousedown', handlePointerDown);
        window.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('mouseup', handlePointerUp);
        
        canvas.addEventListener('touchstart', handlePointerDown, {passive: false});
        window.addEventListener('touchmove', handlePointerMove, {passive: false});
        window.addEventListener('touchend', handlePointerUp);

        // --- SMART CUTTING & PHYSICS ---
        btnCut.addEventListener('click', () => {
            if (state !== 'CUT_READY') return;
            btnCut.style.display = 'none';
            state = 'CUTTING';

            // SMART SNAP LOGIC
            // If shape is actually symmetrical, check if user is close to the true symmetry line
            cutLine = { p1: { ...lineStart }, p2: { ...lineEnd } };
            
            if (currentShape.def.sym) {
                // Calculate user angle
                let dx = cutLine.p2.x - cutLine.p1.x;
                let dy = cutLine.p2.y - cutLine.p1.y;
                let userAngle = Math.atan2(dy, dx);
                
                // Normalize angles to 0..PI for comparison (lines are bidirectional)
                let nUser = (userAngle + Math.PI*4) % Math.PI;
                let nTrue = (currentShape.actualSymAngle + Math.PI*4) % Math.PI;
                
                let angleDiff = Math.abs(nUser - nTrue);
                if (angleDiff > Math.PI/2) angleDiff = Math.PI - angleDiff;

                // Distance from shape center to user line
                let distToCenter = Math.abs(dy * currentShape.x - dx * currentShape.y + cutLine.p2.x * cutLine.p1.y - cutLine.p2.y * cutLine.p1.x) / Math.hypot(dx, dy);

                // Tolerance based on difficulty
                let angleTol = difficulty === 'hard' ? 0.15 : 0.35; // ~8deg to ~20deg
                let distTol = difficulty === 'hard' ? 30 : 60;

                if (angleDiff < angleTol && distToCenter < distTol) {
                    // SNAP! Force the line through the center at the exact angle
                    let extend = 500;
                    cutLine.p1 = {
                        x: currentShape.x - Math.cos(currentShape.actualSymAngle) * extend,
                        y: currentShape.y - Math.sin(currentShape.actualSymAngle) * extend
                    };
                    cutLine.p2 = {
                        x: currentShape.x + Math.cos(currentShape.actualSymAngle) * extend,
                        y: currentShape.y + Math.sin(currentShape.actualSymAngle) * extend
                    };
                }
            }

            // Animate Splitting
            let splitInterval = setInterval(() => {
                splitOffset += 2;
                if (splitOffset > 40) {
                    clearInterval(splitInterval);
                    state = 'ANSWERING';
                    btnSym.style.display = 'block';
                    btnAsym.style.display = 'block';
                }
                drawFrame();
            }, 16);
        });

        // --- ANSWER EVALUATION ---
        function checkAnswer(isUserSayingSym) {
            btnSym.style.display = 'none';
            btnAsym.style.display = 'none';
            state = 'FEEDBACK';

            let shapeActuallySym = currentShape.def.sym;
            
            // Did they find the exact line? (Check if cutLine passes through center and matches angle)
            // If they didn't snap, they missed it. 
            // So if shape is sym, but they made a bad cut, technically the cut halves don't match.
            // But conceptually we want to teach about the shape's property.
            
            let dx = cutLine.p2.x - cutLine.p1.x;
            let dy = cutLine.p2.y - cutLine.p1.y;
            let cutDistToCenter = Math.abs(dy * currentShape.x - dx * currentShape.y + cutLine.p2.x * cutLine.p1.y - cutLine.p2.y * cutLine.p1.x) / Math.hypot(dx, dy);
            let isPerfectCut = shapeActuallySym && cutDistToCenter < 1; // Snapped

            let isCorrect = false;
            let title = "";
            let text = "";

            if (isUserSayingSym) {
                if (shapeActuallySym && isPerfectCut) {
                    isCorrect = true;
                    title = "Correct!";
                    text = "Perfect cut! Both sides are identical mirror images.";
                } else if (shapeActuallySym && !isPerfectCut) {
                    isCorrect = false;
                    title = "Not Quite!";
                    text = "This shape IS symmetrical, but your line was off. See how the halves don't match?";
                } else {
                    isCorrect = false;
                    title = "Oops!";
                    text = "This shape is asymmetrical. No matter how you cut it, the sides won't match perfectly.";
                }
            } else { // User says Asymmetrical
                if (!shapeActuallySym) {
                    isCorrect = true;
                    title = "Correct!";
                    text = "Good eye! This is an irregular shape with no line of symmetry.";
                } else {
                    isCorrect = false;
                    title = "Look Closer!";
                    text = "This shape actually IS symmetrical. You just needed to find the right angle to cut it!";
                }
            }

            feedbackTitle.innerText = title;
            feedbackText.innerText = text;
            feedbackTitle.style.color = isCorrect ? 'var(--success-dark)' : 'var(--accent)';
            feedbackPanel.classList.add('show');

            if (isCorrect) {
                fireConfetti();
            } else {
                container.classList.add('shake');
                setTimeout(() => container.classList.remove('shake'), 500);
            }
        }

        btnSym.addEventListener('click', () => checkAnswer(true));
        btnAsym.addEventListener('click', () => checkAnswer(false));
        btnNext.addEventListener('click', startNewRound);

        diffBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                diffBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                difficulty = e.target.dataset.level;
                startNewRound();
            });
        });

        // --- RENDERING ---
        function drawShapeBase(ctx) {
            ctx.lineWidth = 6;
            ctx.strokeStyle = '#2d3436';
            ctx.fillStyle = currentShape.def.color;
            currentShape.def.draw(ctx);
        }

        function drawShapeHalf(ctx, side, activeCutLine, offsetAmount) {
            let dx = activeCutLine.p2.x - activeCutLine.p1.x;
            let dy = activeCutLine.p2.y - activeCutLine.p1.y;
            let len = Math.hypot(dx, dy);
            let nx = -dy / len; // Normal vector
            let ny = dx / len;
            
            if (side === -1) { nx = -nx; ny = -ny; }

            ctx.save();
            
            // Create massive polygon for clipping
            ctx.beginPath();
            ctx.moveTo(activeCutLine.p1.x, activeCutLine.p1.y);
            ctx.lineTo(activeCutLine.p2.x, activeCutLine.p2.y);
            ctx.lineTo(activeCutLine.p2.x + nx * 3000, activeCutLine.p2.y + ny * 3000);
            ctx.lineTo(activeCutLine.p1.x + nx * 3000, activeCutLine.p1.y + ny * 3000);
            ctx.closePath();
            ctx.clip();

            // Apply separation offset
            ctx.translate(nx * offsetAmount, ny * offsetAmount);

            // Transform to shape coordinates
            ctx.translate(currentShape.x, currentShape.y);
            ctx.rotate(currentShape.rot);
            ctx.scale(currentShape.scale, currentShape.scale);

            drawShapeBase(ctx);
            
            ctx.restore();
        }

        function drawFrame() {
            ctx.clearRect(0, 0, width, height);

            if (!currentShape) return;

            if (state === 'DRAWING' || state === 'CUT_READY') {
                // Draw whole shape
                ctx.save();
                ctx.translate(currentShape.x, currentShape.y);
                ctx.rotate(currentShape.rot);
                ctx.scale(currentShape.scale, currentShape.scale);
                drawShapeBase(ctx);
                ctx.restore();

                // Draw user line
                if (lineStart && lineEnd) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.moveTo(lineStart.x, lineStart.y);
                    ctx.lineTo(lineEnd.x, lineEnd.y);
                    ctx.strokeStyle = 'rgba(45, 52, 54, 0.5)';
                    ctx.lineWidth = 4;
                    ctx.setLineDash([10, 10]);
                    ctx.stroke();
                    ctx.restore();

                    // Scissors icon at cursor
                    ctx.font = "24px sans-serif";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText("✂️", lineEnd.x, lineEnd.y);
                }
            } else if (state === 'CUTTING' || state === 'ANSWERING' || state === 'FEEDBACK') {
                // Draw two halves
                drawShapeHalf(ctx, 1, cutLine, splitOffset);
                drawShapeHalf(ctx, -1, cutLine, splitOffset);

                // Draw cut line indicator
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(cutLine.p1.x, cutLine.p1.y);
                ctx.lineTo(cutLine.p2.x, cutLine.p2.y);
                ctx.strokeStyle = 'rgba(255, 8, 68, 0.3)';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.restore();
            }

            // Draw Confetti
            if (confetti.length > 0) {
                for (let i = confetti.length - 1; i >= 0; i--) {
                    let p = confetti[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.2; // gravity
                    p.rot += p.vRot;
                    p.life -= 0.01;
                    
                    if (p.life <= 0) {
                        confetti.splice(i, 1);
                        continue;
                    }

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot);
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                    ctx.restore();
                }
                requestAnimationFrame(drawFrame);
            }
        }

        // --- CONFETTI SYSTEM ---
        function fireConfetti() {
            const colors = ['#4facfe', '#00f2fe', '#ff0844', '#ffb199', '#38ef7d', '#f9ca24'];
            for (let i = 0; i < 80; i++) {
                confetti.push({
                    x: width / 2,
                    y: height / 2,
                    vx: (Math.random() - 0.5) * 20,
                    vy: (Math.random() - 0.5) * 20 - 5,
                    size: Math.random() * 8 + 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rot: Math.random() * Math.PI * 2,
                    vRot: (Math.random() - 0.5) * 0.5,
                    life: 1.0 + Math.random() * 0.5
                });
            }
            drawFrame();
        }

        // Initialize
        resize();
        startNewRound();

    </script>
</body>
</html>
